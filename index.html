<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f7f7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"></noscript>
    <title>Caputo Home</title>
  </head>
  <body class="bg-ivory text-charcoal antialiased font-body">
    <div id="root">
      <div id="splash" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:0 24px">
        <img src="/caputoappicon.png" alt="" width="64" height="64" style="border-radius:16px;margin-bottom:16px">
        <div id="splash-spinner" style="width:28px;height:28px;border:3px solid #d1ccc7;border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite"></div>
        <button id="splash-retry" type="button" style="display:none;margin-top:28px;padding:10px 20px;background:#fff;border:1px solid #d1ccc7;border-radius:10px;font-family:system-ui,-apple-system,sans-serif;font-size:14px;font-weight:500;color:#444;cursor:pointer;-webkit-tap-highlight-color:transparent">Tap to reload</button>
      </div>
      <style>@keyframes sp{to{transform:rotate(360deg)}}</style>
    </div>
    <script>
      // Self-recovery: if the splash hasn't been replaced in 12s, clear the SW +
      // caches and reload. Counter-based (localStorage so it survives PWA
      // force-close) with a 24h window and a 3-attempt cap so we never loop
      // forever. A manual "Tap to reload" button appears at 5s for instant
      // recovery without the wait.
      try { sessionStorage.removeItem('sw-reset'); } catch (e) {}
      var RESET_COUNT_KEY = 'sw-reset-count';
      var RESET_TS_KEY = 'sw-reset-ts';
      var MAX_RESETS = 3;
      var WINDOW_MS = 24 * 60 * 60 * 1000;

      function recoverNow() {
        if (!document.getElementById('splash')) return;
        var now = Date.now();
        var firstTs = parseInt(localStorage.getItem(RESET_TS_KEY) || '0', 10);
        var count = parseInt(localStorage.getItem(RESET_COUNT_KEY) || '0', 10);
        if (!firstTs || now - firstTs > WINDOW_MS) {
          firstTs = now;
          count = 0;
          localStorage.setItem(RESET_TS_KEY, String(firstTs));
        }
        if (count >= MAX_RESETS) return;
        localStorage.setItem(RESET_COUNT_KEY, String(count + 1));
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) { r.unregister(); });
            caches.keys().then(function(keys) {
              Promise.all(keys.map(function(k) { return caches.delete(k); })).then(function() {
                window.location.reload();
              });
            });
          });
        } else {
          window.location.reload();
        }
      }

      // Show the manual retry button at 5s so the user can recover without waiting.
      setTimeout(function() {
        var btn = document.getElementById('splash-retry');
        if (btn && document.getElementById('splash')) {
          btn.style.display = 'inline-block';
          btn.addEventListener('click', recoverNow);
        }
      }, 5000);

      // Auto-recovery at 12s if still stuck.
      setTimeout(recoverNow, 12000);

      // Once React mounts and removes the splash, reset the counter so future
      // hangs get the full 3-attempt budget again.
      window.addEventListener('load', function() {
        var attempts = 0;
        var iv = setInterval(function() {
          attempts++;
          if (!document.getElementById('splash')) {
            localStorage.removeItem(RESET_COUNT_KEY);
            localStorage.removeItem(RESET_TS_KEY);
            clearInterval(iv);
          } else if (attempts > 30) {
            clearInterval(iv);
          }
        }, 500);
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
